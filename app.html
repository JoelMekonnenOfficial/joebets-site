<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — JoeBets</title>
<link rel="icon" type="image/png" href="/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="dash-shell">

<!-- ─── Nav ─── -->
<nav class="nav">
  <div class="container nav-inner">
    <a href="/" class="nav-brand">
      <img src="/logo.png" alt="JoeBets">
    </a>
    <div class="nav-links">
      <a href="/app.html" class="active">Dashboard</a>
      <a href="/community.html">Community</a>
      <a href="/#pricing">Membership</a>
    </div>
    <div class="nav-cta" id="navCta">
      <button class="btn btn-ghost" onclick="openAuth('free')">Sign in</button>
    </div>
  </div>
</nav>

<!-- ─── Main ─── -->
<main class="dash-main">
  <div class="container">

    <div id="tierBanner"></div>

    <div class="dash-header">
      <h1>Upcoming events</h1>
      <div style="color:var(--ink-faint); font-size:0.9rem;" id="lastUpdated"></div>
    </div>

    <div class="filter-bar" id="filterBar">
      <button class="filter-chip active" data-league="all">All</button>
      <button class="filter-chip" data-league="ufc">UFC</button>
      <button class="filter-chip" data-league="boxing">Boxing</button>
      <button class="filter-chip" data-league="nba">NBA</button>
      <button class="filter-chip" data-league="nfl">NFL</button>
    </div>

    <div id="eventGrid" class="event-grid">
      <div class="loading">Loading upcoming events…</div>
    </div>

  </div>
</main>

<footer>
  <div class="container foot-row">
    <div>© 2026 JoeBets. Bet responsibly.</div>
    <div>
      <a href="/">Home</a>
      <a href="/#pricing">Membership</a>
      <a href="mailto:joe4ku@gmail.com">Contact</a>
    </div>
  </div>
</footer>

<!-- ─── Auth modal (shared) ─── -->
<div class="modal-bg" id="authModal" onclick="if(event.target.id==='authModal')closeAuth()">
  <div class="modal">
    <button class="close" onclick="closeAuth()">×</button>
    <h3 id="authTitle">Sign in to JoeBets</h3>
    <p id="authSub" style="margin:0 0 6px; font-size:0.95rem;">Enter your email — we'll send you a magic link.</p>
    <form onsubmit="submitAuth(event)">
      <input type="email" id="authEmail" placeholder="you@email.com" required autocomplete="email">
      <button type="submit" class="btn btn-primary submit" id="authSubmit">Send magic link</button>
    </form>
    <div id="authMsg"></div>
    <p class="tiny">No passwords. No spam. We'll email you a one-time sign-in link.</p>
  </div>
</div>

<script>
/* ─── Auth state ─── */
function getSession() {
  try {
    const raw = localStorage.getItem('jb.session');
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (s.exp && s.exp < Date.now()/1000) { localStorage.removeItem('jb.session'); return null; }
    return s;
  } catch { return null; }
}
function setSession(token, payload) {
  localStorage.setItem('jb.session', JSON.stringify({ token, ...payload }));
}
function signOut() {
  localStorage.removeItem('jb.session');
  location.reload();
}

/* Magic-link handoff: if URL has ?token=..., save it */
(function handleMagicLink() {
  const p = new URLSearchParams(location.search);
  const token = p.get('token');
  if (!token) return;
  try {
    const [, payloadB64] = token.split('.');
    const payload = JSON.parse(atob(payloadB64.replace(/-/g,'+').replace(/_/g,'/')));
    setSession(token, payload);
    // Clean URL
    history.replaceState({}, '', location.pathname);
  } catch (e) { console.warn('Bad token', e); }
})();

function renderNavCta() {
  const s = getSession();
  const nav = document.getElementById('navCta');
  if (s) {
    const tier = (s.tier || 'free').toUpperCase();
    nav.innerHTML = `
      <span style="color:var(--ink-dim); font-size:0.88rem; margin-right:10px;">
        ${s.email} · <span style="color:var(--gold-bright); font-weight:600;">${tier}</span>
      </span>
      ${s.tier !== 'gold' ? '<button class="btn btn-primary" onclick="openAuth(\'gold\')">Upgrade</button>' : ''}
      <button class="btn btn-ghost" onclick="signOut()">Sign out</button>
    `;
  } else {
    nav.innerHTML = `
      <button class="btn btn-ghost" onclick="openAuth('free')">Sign in</button>
      <button class="btn btn-primary" onclick="openAuth('gold')">Get Gold</button>
    `;
  }
}

function renderTierBanner() {
  const s = getSession();
  const el = document.getElementById('tierBanner');
  if (!s) {
    el.innerHTML = `
      <div class="tier-banner">
        <div class="msg">You're browsing as a <strong>Visitor</strong>. Create a free account to unlock the community — or <strong>get the Gold Ticket</strong> to see every pick.</div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-ghost" onclick="openAuth('free')">Free account</button>
          <button class="btn btn-primary" onclick="openAuth('gold')">Get Gold</button>
        </div>
      </div>`;
  } else if (s.tier !== 'gold') {
    el.innerHTML = `
      <div class="tier-banner">
        <div class="msg">You're on the <strong>Free</strong> plan. Upgrade to Gold Ticket to unlock all picks and analysis.</div>
        <button class="btn btn-primary" onclick="openAuth('gold')">Upgrade to Gold</button>
      </div>`;
  } else {
    el.innerHTML = '';
  }
}

/* ─── Events ─── */
let allEvents = [];
let activeLeague = 'all';

async function loadEvents() {
  try {
    const res = await fetch('/.netlify/functions/events');
    if (!res.ok) throw new Error('Could not load events');
    const data = await res.json();
    allEvents = data.events || [];
    document.getElementById('lastUpdated').textContent = data.updated ? 'Updated ' + new Date(data.updated).toLocaleString() : '';
    renderEvents();
  } catch (e) {
    document.getElementById('eventGrid').innerHTML = `
      <div class="empty">
        <div style="font-size:1.1rem; color:var(--ink-dim); margin-bottom:8px;">Live events unavailable</div>
        <div style="font-size:0.9rem;">${e.message}. Event feed requires the backend function to be deployed.</div>
      </div>`;
  }
}

function renderEvents() {
  const s = getSession();
  const isGold = s && s.tier === 'gold';
  const grid = document.getElementById('eventGrid');
  const filtered = activeLeague === 'all' ? allEvents : allEvents.filter(e => e.league === activeLeague);

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty">No upcoming events in this category.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(ev => {
    const dt = ev.startTime ? new Date(ev.startTime).toLocaleString([], { weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }) : ev.dateText || '';
    const pickBlock = ev.pick && isGold
      ? `<div class="pick">
           <span class="label">Pick</span>
           ${ev.pick.text} ${ev.pick.units ? `· <span style="color:var(--gold-bright);">${ev.pick.units}u</span>` : ''}
         </div>`
      : ev.pick
        ? `<div class="pick" style="opacity:0.5;"><span class="label">Pick</span>
             <span style="filter:blur(5px); user-select:none;">Pereira by KO, Rd 2 · 3u</span>
             <div style="margin-top:8px; font-size:0.78rem; color:var(--gold-bright);">🔒 Gold Ticket required</div>
           </div>`
        : '';
    return `
      <div class="event-card${ev.pick && !isGold ? ' ' : ''}">
        ${ev.pick && !isGold ? '<span class="lock-badge">GOLD</span>' : ''}
        <div class="league">${ev.leagueName || ev.league.toUpperCase()}${ev.card ? ' · ' + ev.card : ''}</div>
        <div class="matchup">${ev.matchup}</div>
        <div class="meta">${dt}${ev.venue ? ' · ' + ev.venue : ''}</div>
        ${pickBlock}
      </div>`;
  }).join('');
}

document.getElementById('filterBar').addEventListener('click', (e) => {
  if (!e.target.classList.contains('filter-chip')) return;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  activeLeague = e.target.dataset.league;
  renderEvents();
});

/* ─── Auth modal (copy of index.html) ─── */
let authIntent = 'free';
function openAuth(intent) {
  authIntent = intent || 'free';
  const t = document.getElementById('authTitle');
  const s = document.getElementById('authSub');
  const b = document.getElementById('authSubmit');
  if (authIntent === 'gold') {
    t.textContent = 'Get your Gold Ticket';
    s.textContent = 'Enter your email — we\'ll create your account and send you to checkout.';
    b.textContent = 'Continue to Stripe';
  } else {
    t.textContent = 'Sign in or create a free account';
    s.textContent = 'Enter your email — we\'ll send you a magic link.';
    b.textContent = 'Send magic link';
  }
  document.getElementById('authMsg').innerHTML = '';
  document.getElementById('authModal').classList.add('open');
  setTimeout(() => document.getElementById('authEmail').focus(), 50);
}
function closeAuth() { document.getElementById('authModal').classList.remove('open'); }
async function submitAuth(e) {
  e.preventDefault();
  const email = document.getElementById('authEmail').value.trim();
  const msg = document.getElementById('authMsg');
  const btn = document.getElementById('authSubmit');
  btn.disabled = true;
  btn.textContent = 'Working…';
  try {
    const endpoint = authIntent === 'gold' ? '/.netlify/functions/checkout' : '/.netlify/functions/auth-request';
    const res = await fetch(endpoint, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, tier: authIntent })
    });
    if (!res.ok) {
      const { error } = await res.json().catch(() => ({ error: 'Something went wrong.' }));
      throw new Error(error);
    }
    const data = await res.json();
    if (data.url) { window.location.href = data.url; return; }
    msg.innerHTML = '<div class="success">Check your email for the sign-in link.</div>';
    btn.textContent = 'Sent ✓';
  } catch (err) {
    msg.innerHTML = '<div class="err">' + (err.message || 'Try again.') + '</div>';
    btn.disabled = false;
    btn.textContent = authIntent === 'gold' ? 'Continue to Stripe' : 'Send magic link';
  }
}
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAuth(); });

/* ─── Boot ─── */
renderNavCta();
renderTierBanner();
loadEvents();
</script>

</body>
</html>
